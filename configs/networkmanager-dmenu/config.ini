[dmenu]
dmenu_command = rofi -dmenu -i -theme-str 'window { width: 34%; border-radius: 14px; } listview { lines: 9; }'
active_chars = ==
highlight = True
highlight_bold = True
compact = False
wifi_icons = 󰤯󰤟󰤢󰤥󰤨
format = {name:<{max_len_name}s}  {sec:<{max_len_sec}s} {icon:>4}
list_saved = True
prompt = WiFi

[dmenu_passphrase]
obscure = True
obscure_color = #222222

[editor]
terminal = kitty
gui_if_available = True
gui = nm-connection-editor

[nmdm]
rescan_delay = 3
